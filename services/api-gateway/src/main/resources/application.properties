server.port=8082
spring.application.name=api-gateway

# --- CORS Configuration (Using the NEW webflux prefix) ---
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*

# --- Routes Configuration ---

# Route 1: Chat Service
spring.cloud.gateway.server.webflux.routes[0].id=chat-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://chat-service:8080
# Matches /api/users OR /api/messages (Comma means OR)
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**, /api/messages/**

# Route 2: Chat Service (WebSockets)
spring.cloud.gateway.server.webflux.routes[1].id=chat-websocket
spring.cloud.gateway.server.webflux.routes[1].uri=ws://chat-service:8080
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/ws-chat/**

# Route 3: Post Service
spring.cloud.gateway.server.webflux.routes[2].id=post-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://post-service:8081
# FIX: Combined paths into ONE predicate using the new prefix
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/posts/**, /images/**